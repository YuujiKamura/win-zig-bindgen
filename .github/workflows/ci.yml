name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build

      - name: Unit tests
        run: zig build test

      - name: Check metadata sync
        shell: pwsh
        run: ./scripts/check-metadata-sync.ps1

      - name: Check tabview delegate IIDs
        shell: pwsh
        run: ./scripts/check-tabview-delegate-iids.ps1

      - name: Script guard tests
        shell: pwsh
        run: ./scripts/test-script-guards.ps1

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -AllowClobber

      - name: Lint PowerShell scripts
        shell: pwsh
        run: ./scripts/lint-powershell.ps1
